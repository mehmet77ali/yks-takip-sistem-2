<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soru Kutusu | Giriş</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script>
    if (localStorage.getItem('soru-kutusu-theme') === 'dark' || (!localStorage.getItem('soru-kutusu-theme') && matchMedia('(prefers-color-scheme: dark)').matches)) document.documentElement.classList.add('dark');
  </script>
  <style>
    .field { width: 100%; border: 1px solid #cbd5e1; border-radius: .75rem; padding: .75rem; background: #f8fafc; outline: none; }
    .dark .field { color: #f8fafc; background: #0f172a; border-color: #475569; }
    .field:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgb(99 102 241 / .2); }
  </style>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-50 p-4 text-slate-800 dark:bg-slate-950 dark:text-slate-100">
  <main class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-7 shadow-xl dark:border-slate-700 dark:bg-slate-900">
    <div class="mb-7 text-center">
      <div class="mb-2 text-4xl">📚</div>
      <h1 class="text-3xl font-black text-indigo-600 dark:text-indigo-400">Soru Kutusu</h1>
      <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">TYT ve AYT çalışma takip alanın</p>
    </div>

    <form id="login-form" class="space-y-3">
      <h2 class="text-xl font-bold">Giriş yap</h2>
      <input id="login-email" type="email" required autocomplete="email" placeholder="E-posta" class="field" />
      <input id="login-password" type="password" required autocomplete="current-password" placeholder="Şifre" class="field" />
      <button class="w-full rounded-xl bg-indigo-600 px-4 py-3 font-bold text-white transition hover:bg-indigo-700 disabled:opacity-60" type="submit">Giriş yap</button>
      <p class="pt-1 text-center text-sm text-slate-500">Hesabın yok mu? <button id="show-register" type="button" class="font-bold text-indigo-600 dark:text-indigo-400">Kayıt ol</button></p>
    </form>

    <form id="register-form" class="hidden space-y-3">
      <h2 class="text-xl font-bold">Kayıt ol</h2>
      <input id="register-name" required maxlength="30" autocomplete="nickname" placeholder="Kullanıcı adı" class="field" />
      <input id="register-email" type="email" required autocomplete="email" placeholder="E-posta" class="field" />
      <input id="register-password" type="password" required minlength="6" autocomplete="new-password" placeholder="Şifre (en az 6 karakter)" class="field" />
      <button class="w-full rounded-xl bg-emerald-500 px-4 py-3 font-bold text-white transition hover:bg-emerald-600 disabled:opacity-60" type="submit">Hesap oluştur</button>
      <p class="pt-1 text-center text-sm text-slate-500">Hesabın var mı? <button id="show-login" type="button" class="font-bold text-indigo-600 dark:text-indigo-400">Giriş yap</button></p>
    </form>

    <p id="message" class="mt-4 hidden rounded-lg p-3 text-sm"></p>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyAkPM0K52M7V5MgUCf5SmSvGlQjP5FJ4wQ',
      authDomain: 'yks-takip-sistemi-a733e.firebaseapp.com',
      projectId: 'yks-takip-sistemi-a733e',
      storageBucket: 'yks-takip-sistemi-a733e.appspot.com',
      messagingSenderId: '670248896860',
      appId: '1:670248896860:web:ba920d610ce57b4762d999'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const cloud = getFirestore(app);
    const $ = (selector) => document.querySelector(selector);
    let creatingProfile = false;

    function sessionDayKey() {
      const parts = new Intl.DateTimeFormat('en-US', { timeZone: 'Europe/Istanbul', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', hourCycle: 'h23' }).formatToParts(new Date());
      const value = Object.fromEntries(parts.filter((part) => part.type !== 'literal').map((part) => [part.type, part.value]));
      const start = Date.UTC(Number(value.year), Number(value.month) - 1, Number(value.day));
      return new Date(start - (Number(value.hour) < 4 ? 86_400_000 : 0)).toISOString().slice(0, 10);
    }

    function message(text, type = 'error') {
      const box = $('#message');
      box.textContent = text;
      box.className = `mt-4 rounded-lg p-3 text-sm ${type === 'error' ? 'bg-rose-50 text-rose-700 dark:bg-rose-950 dark:text-rose-200' : 'bg-emerald-50 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-200'}`;
    }

    function friendlyError(error) {
      const code = error?.code || '';
      if (code.includes('invalid-credential') || code.includes('wrong-password') || code.includes('user-not-found')) return 'E-posta veya şifre hatalı.';
      if (code.includes('email-already-in-use')) return 'Bu e-posta zaten kayıtlı.';
      if (code.includes('weak-password')) return 'Şifre en az 6 karakter olmalı.';
      if (code.includes('network')) return 'Bağlantı kurulamadı. İnternetini kontrol et.';
      return 'İşlem tamamlanamadı. Bilgileri kontrol edip yeniden dene.';
    }

    function showForm(name) {
      $('#login-form').classList.toggle('hidden', name !== 'login');
      $('#register-form').classList.toggle('hidden', name !== 'register');
      $('#message').classList.add('hidden');
    }

    function goHome() { window.location.replace('./anasayfa.html'); }

    $('#show-register').onclick = () => showForm('register');
    $('#show-login').onclick = () => showForm('login');

    $('#login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = event.submitter;
      button.disabled = true;
      try {
        await signInWithEmailAndPassword(auth, $('#login-email').value.trim(), $('#login-password').value);
        goHome();
      } catch (error) {
        message(friendlyError(error));
      } finally {
        button.disabled = false;
      }
    });

    $('#register-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = event.submitter;
      const username = $('#register-name').value.trim();
      if (!username) return message('Kullanıcı adı girmen gerekiyor.');
      button.disabled = true;
      creatingProfile = true;
      try {
        const result = await createUserWithEmailAndPassword(auth, $('#register-email').value.trim(), $('#register-password').value);
        await updateProfile(result.user, { displayName: username });
        await setDoc(doc(cloud, 'users', result.user.uid), { username, dailyQuestions: 0, dayKey: sessionDayKey() });
        goHome();
      } catch (error) {
        await signOut(auth);
        creatingProfile = false;
        message(friendlyError(error));
      } finally {
        button.disabled = false;
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user && !creatingProfile) goHome();
    });
  </script>
</body>
</html>
